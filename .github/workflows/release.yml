name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Test (the same checks CI runs gate the release)
        run: |
          chmod +x hooks/session-start
          ./hooks/session-start > /tmp/hook-out.json
          python3 - <<'EOF'
          import json
          d = json.load(open('/tmp/hook-out.json'))
          out = d['hookSpecificOutput']
          assert out['hookEventName'] == 'SessionStart'
          assert 'DevStandard' in out['additionalContext']
          words = len(open('core.md').read().split())
          tokens = int(words * 1.35)
          assert tokens <= 5000, 'core.md exceeds the every-session budget (ADR 0007 as amended, ceiling 5000)'
          EOF
          ! grep -rn "@[a-zA-Z0-9_-]*/" core.md howto/ aids/ --include='*.md' \
            | grep -v "actions/" | grep -v "anthropic" | grep .
      - name: Versions must match the tag
        run: |
          python3 - <<'EOF'
          import json, os
          tag = os.environ['GITHUB_REF_NAME'].lstrip('v')
          p = json.load(open('.claude-plugin/plugin.json'))['version']
          m = json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version']
          assert p == m == tag, f'plugin.json={p} marketplace.json={m} tag={tag}'
          EOF
      - name: Publish GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — nothing to publish."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
