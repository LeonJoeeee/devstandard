name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Hook emits a valid, bounded SessionStart forced-read instruction
        run: |
          chmod +x hooks/session-start
          ./hooks/session-start > /tmp/hook-out.json
          python3 - <<'EOF'
          import json
          raw = open('/tmp/hook-out.json', 'rb').read()
          # (c) total hook output stays well under the harness's ~10KB inline cap on
          # additionalContext, so delivery can never silently regress to a 2KB preview
          # (issue #35, ADR 0019). This is the byte gate the cap itself never gave us.
          assert len(raw) < 4000, f'hook output {len(raw)} bytes must stay < 4000'
          d = json.loads(raw)
          out = d['hookSpecificOutput']
          # (a) valid JSON, SessionStart event.
          assert out['hookEventName'] == 'SessionStart'
          ctx = out['additionalContext']
          assert 'DevStandard' in ctx
          # (b) it names core.md and carries the mandatory first-action read instruction.
          assert 'core.md' in ctx, 'additionalContext must name core.md'
          assert 'FIRST ACTION' in ctx, 'additionalContext must force the first-action read'
          print(f'hook OK, {len(raw)} bytes total, additionalContext {len(ctx)} chars')
          EOF
      - name: core.md stays within its token budget
        run: |
          python3 - <<'EOF'
          words = len(open('core.md').read().split())
          tokens = int(words * 1.35)
          print(f'core.md ~{tokens} tokens (ceiling 5000, ADR 0007 as amended)')
          assert tokens <= 5000, 'core.md exceeds the every-session budget (ADR 0007 as amended, ceiling 5000)'
          EOF
      - name: No @path references (they force-load context)
        run: |
          ! grep -rn "@[a-zA-Z0-9_-]*/" core.md howto/ aids/ --include='*.md' \
            | grep -v "actions/" | grep -v "anthropic" | grep .
      - name: plugin.json and marketplace.json versions stay in lockstep (main is what the marketplace installs)
        run: |
          python3 - <<'EOF'
          import json
          p = json.load(open('.claude-plugin/plugin.json'))['version']
          m = json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version']
          assert p == m, f'plugin.json={p} != marketplace.json={m}'
          print('versions in lockstep:', p)
          EOF
