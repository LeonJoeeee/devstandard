name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hook emits valid SessionStart JSON
        run: |
          chmod +x hooks/session-start
          ./hooks/session-start > /tmp/hook-out.json
          python3 - <<'EOF'
          import json
          d = json.load(open('/tmp/hook-out.json'))
          out = d['hookSpecificOutput']
          assert out['hookEventName'] == 'SessionStart'
          assert 'DevBook' in out['additionalContext']
          print('hook OK,', len(out['additionalContext']), 'chars')
          EOF
      - name: core.md stays within its token budget
        run: |
          python3 - <<'EOF'
          words = len(open('core.md').read().split())
          tokens = int(words * 1.35)
          print(f'core.md ~{tokens} tokens (ceiling 1000)')
          assert tokens <= 1000, 'core.md exceeds the every-session budget (ADR 0007)'
          EOF
      - name: No @path references (they force-load context)
        run: |
          ! grep -rn "@[a-zA-Z0-9_-]*/" core.md howto/ aids/ --include='*.md' \
            | grep -v "actions/" | grep -v "anthropic" | grep .
